version: "3.8"

services:
  claude-monarch:
    image: ghcr.io/aldarondo/claude-monarch:latest
    container_name: claude-monarch
    network_mode: host
    restart: unless-stopped
    environment:
      - MONARCH_TOKEN=${MONARCH_TOKEN}
      - PORT=8775
    volumes:
      - ./logs:/app/logs
    command: sh -c "node dist/serve.js 2>&1 | tee -a /app/logs/app.log"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
