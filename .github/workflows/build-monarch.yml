name: Build monarch image

on:
  push:
    branches: [main]
    paths:
      - src/**
      - Dockerfile
      - package*.json
      - tsconfig.json
      - docker-compose.yml
      - .github/workflows/build-monarch.yml
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-monarch:latest
            ghcr.io/${{ github.repository_owner }}/claude-monarch:${{ github.sha }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb && sudo apt-get install -y sshpass

